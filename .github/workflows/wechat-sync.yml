name: Sync WeChat Style + Exports

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wechat-sync-master
  cancel-in-progress: true

jobs:
  build_site:
    name: Build Site (master)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Jekyll Build
        run: bundle exec jekyll build --config _config.yml,_config-dev.yml

  sync_wechat_branch:
    name: Update wechat-style branch
    runs-on: ubuntu-latest
    needs: build_site
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install exporter deps
        run: python -m pip install -r tools/wechat/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Checkout wechat-style (or create)
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin wechat-style >/dev/null 2>&1; then
            echo "Remote wechat-style exists."
            git fetch origin wechat-style:wechat-style
            git checkout wechat-style
          else
            echo "Remote wechat-style does not exist; create from current master."
            git checkout -b wechat-style
          fi

      - name: Merge master -> wechat-style
        run: |
          git fetch origin master
          git merge origin/master --no-edit -X theirs

      - name: Generate WeChat exports (and enforce layout)
        run: |
          rm -rf wechat_exports
          python tools/wechat/sync_wechat.py --out wechat_exports

      - name: Commit and push (if changed)
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Sync WeChat exports (${GITHUB_SHA})"
          git push origin HEAD:wechat-style

      - name: Notify publish service (optional)
        if: ${{ secrets.WECHAT_PUBLISH_WEBHOOK_URL != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.WECHAT_PUBLISH_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"${GITHUB_REF}\",\"sha\":\"${GITHUB_SHA}\",\"branch\":\"wechat-style\"}" \
            "${WEBHOOK_URL}"
